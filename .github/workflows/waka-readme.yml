name: WakaTime Card

# Regenerates assets/wakatime.svg from the WakaTime API (self-hosted, no
# external card service). Requires repo secret WAKATIME_API_KEY.

on:
  schedule:
    - cron: "0 6 * * *"   # daily at 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-card:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Generate WakaTime card
        env:
          WAKATIME_API_KEY: ${{ secrets.WAKATIME_API_KEY }}
        run: python scripts/wakatime_card.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/wakatime.svg
          git diff --staged --quiet || git commit -m "chore: refresh WakaTime card"
          git push
